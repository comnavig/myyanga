services:
  php74:
    build:
      context: .
      dockerfile: Dockerfile-74
    ports:
      - "8074:80"
    volumes:
      - .:/var/www/html:Z
    depends_on:
      db:
        condition: service_healthy

  # Not needed for now, we will move to it later when project laravel version has been updated and tested on php 8.1.
  # php81:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile-81
  #   ports:
  #     - "8081:80"
  #   volumes:
  #     - .:/var/www/html:Z
  #   depends_on:
  #     - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myyanga
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 2s
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:
