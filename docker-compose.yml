services:
  php74:
    build:
      context: .
      dockerfile: Dockerfile-74
    ports:
      - "8074:80"
    volumes:
      - .:/var/www/html:Z
    depends_on:
      - db

  # php81:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile-81
  #   ports:
  #     - "8081:80"
  #   volumes:
  #     - .:/var/www/html:Z
  #   depends_on:
  #     - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legacy_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data: