services:
  php74:
    build:
      context: ../../
      dockerfile: docker/prod/Dockerfile
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=myyanga
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myyanga
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
